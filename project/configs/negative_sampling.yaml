# ============================================================
# Negative Sampling Configuration (v5)
# ============================================================
# v5 rebalance: easy negatives (random + cross_category) were ~67% of the
# produced data in v4 due to a quota-truncation bug, while the model already
# solved them at >99% TNR. Hard strategies now dominate the training signal.

# --- Overall Settings ---
positive_negative_ratio: 3  # 1 positive : 3 negatives

# --- Strategy Ratios (normalized over active strategies) ---
strategy_ratios:
  random: 0.05
  cross_category: 0.05
  same_category: 0.30
  same_brand: 0.15
  lexical_hard: 0.15
  attribute_conflict: 0.05
  cross_query: 0.05
  # Requires precomputed neighbors (project/embeddings/build_embedding_neighbors.py).
  # The sampler raises if this is > 0 without a neighbors file — no silent fallback.
  embedding_hard: 0.20

# --- Type-Based Sample Weights ---
# Final weight = type_weight × 0.9 noise discount when confidence < 0.90.
# Easy types are downweighted (the model already solves them at >99% TNR);
# hard types carry full weight.
type_weights:
  random: 0.7
  cross_category: 0.7
  same_category: 1.0
  same_brand: 1.0
  lexical_hard: 1.0
  attribute_conflict: 1.0
  cross_query: 1.0
  embedding_hard: 1.0
  mined_hard: 0.8

# --- Confidence Thresholds ---
confidence:
  # Sample weighting based on negative confidence
  weight_tiers:
    - min: 0.95
      max: 1.00
      weight: 1.0
    - min: 0.90
      max: 0.95
      weight: 0.8
    - min: 0.80
      max: 0.90
      weight: 0.6
  discard_below: 0.80

# --- Probable-Positive Filter ---
probable_positive:
  # Candidates matching these criteria are NOT used as negatives
  title_contains_query_threshold: 0.85  # token overlap ratio
  semantic_similarity_threshold: 0.92
  lexical_similarity_threshold: 0.90
  require_category_match: true   # overlap rules only apply when categories match/unknown
  require_brand_match: false     # brand alone not sufficient
